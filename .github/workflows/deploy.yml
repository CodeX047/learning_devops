name: Deploy on EXCloud

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: QEMU
        uses: docker/setup-qemu-action@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Docker Build and Push
        run: |
          docker build -t vishal040705/devops-chaicode .
          docker push vishal040705/devops-chaicode

      - name: Deploy to EXCloud
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 210.79.129.179
          username: ubuntu
          key: ${{ secrets.PRIVATE_KEY }}
          script: |
            # kill the docker container
            sudo docker rm -f devops-chaicode || true

            # Again pull the image
            sudo docker pull vishal040705/devops-chaicode

            # Run the container
            sudo docker run -d --name devops-chaicode -p 8000:8000 vishal040705/devops-chaicode

            # Clean up old/unused images
            sudo docker image prune -f
